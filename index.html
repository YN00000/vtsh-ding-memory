<!DOCTYPE html>

    <meta charset="UTF-8">

    <title>送給高一丁的各位</title>

    <style>
        .header{
            background:linear-gradient(90deg,#d4d2d3,#ffe8f0);
            display: flex;
            gap:40px;
            text-align: left;
            padding: 30px;
            box-shadow: 0 4px 10px rgb(0,0,0,0.1);   
        }

        .img img {
            width: 200px;
            height: 200px;

            object-fit: cover;
            border-radius: 50%;

            border: 4px solid white;
            box-shadow: 0 4px 10px rgba(0,0,0,0.2);

            transition: 0.3s;
        }

        .img img:hover {
            transform: scale(1.08);
        }        
        h1 {
            font-size: 25px;
        }

        p {
            font-size: 16px;
            line-height: 1.8;
        }
        body {
            background-color: #fff5f8;
            font-family: Arial, sans-serif;
            text-align: center;
            padding: 50px;
        }

        .hover-card {
            width: 300px;
            background: #ffe8f0;
            padding: 20px;
            border-radius: 20px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.1);
            transition: all 0.3s ease;
            z-index: 10;
            text-align: center;
        }
        .hover-text {
            margin-top: 10px;
        }

        .hover-text summary{
            cursor: pointer;
            font-weight: bold;
            list-style: none;
        }

        .hover-text summary::-webkit-details-marker{
            display: none;
        }

        details .hover-card{
            display:none;
        }

        details[open] .hover-card{
            display:block;
        }

        .gallery {
            display: grid;
            grid-template-columns: repeat(5, 1fr);
            gap: 10px;
            margin-top: 30px;
            grid-auto-flow: dense;
        }

        .gallery img {
            width: 100%;
            border-radius: 15px;
            object-fit: cover;
        }

        .gallery img:nth-child(2),
        .gallery img:nth-child(6),
        .gallery img:nth-child(7),
        .gallery img:nth-child(9){
            grid-column: span 2;
            grid-row: span 2;
        }

        .gallery1,
        .gallery2,
        .gallery3,
        .gallery4 {
            display: grid;
            gap: 15px;
            margin-top: 30px;
            grid-auto-flow: dense;
        }

        .gallery1 { 
            grid-template-columns: repeat(4, 1fr); 
        }
        .gallery2 { 
            grid-template-columns: repeat(4, 1fr); 
        }
        .gallery3 { 
            grid-template-columns: repeat(5, 1fr); 
        }
        .gallery4 { 
            grid-template-columns: repeat(4, 1fr); 
        }
        
        .gallery1 img,
        .gallery2 img,
        .gallery3 img,
        .gallery4 img {
            width: 100%;
            border-radius: 15px;
            object-fit: cover;
        }

        .gallery1 img:nth-child(2),
        .gallery2 img:nth-child(5),
        .gallery3 img:nth-child(7),
        .gallery3 img:nth-child(8){
            grid-column: span 2;
            grid-row: span 2;
        }

        .footer{
            background:linear-gradient(90deg,#d4d2d3);
            gap:40px;
            text-align: left;
            padding: 30px;
            box-shadow: 0 4px 10px rgb(0,0,0,0.1);
            text-align: center;
            margin-top: 20px;
        }

        @media (max-width:768px){

        .header{
            flex-direction: column;
            text-align: center;
        }

        .gallery{
            grid-template-columns: repeat(2,1fr);
        }

        .card{
            width: 90%;
        }
    }
    </style>
</head>
